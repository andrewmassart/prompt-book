<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Session Export — prompt-book</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
    background: #161616; color: #d4d4d4; line-height: 1.6; padding: 20px;
  }
  .header {
    max-width: 900px; margin: 0 auto 24px; padding: 16px 20px;
    background: #1e1e1e; border-radius: 12px; border: 1px solid #2e2e2e;
  }
  .header h1 { font-size: 1.3em; color: #6b9eff; margin-bottom: 4px; }
  .header .meta { font-size: 0.85em; color: #999; }
  .messages { max-width: 900px; margin: 0 auto; }
  .message { margin-bottom: 12px; padding: 12px 16px; border-radius: 10px; }
  .message.user { background: #1e1e1e; border-left: 3px solid #e0a458; }
  .message.assistant { background: #1e1e1e; border-left: 3px solid #6b9eff; }
  .message.system { background: #161616; border-left: 3px solid #5a5a5a; font-size: 0.85em; color: #999; }
  .role-label { font-size: 0.75em; text-transform: uppercase; font-weight: 600; margin-bottom: 6px; letter-spacing: 0.05em; }
  .role-label.user { color: #e0a458; }
  .role-label.assistant { color: #6b9eff; }
  .role-label.system { color: #5a5a5a; }
  .tool-block {
    margin: 8px 0; padding: 10px; background: #121212; border-radius: 8px;
    border: 1px solid #2e2e2e; font-size: 0.9em;
  }
  .tool-block summary { cursor: pointer; color: #e0a458; font-weight: 500; }
  .tool-block pre { margin-top: 8px; white-space: pre-wrap; word-break: break-all; font-size: 0.85em; color: #999; }
  .thinking-block {
    margin: 8px 0; padding: 10px; background: #1a1a1a; border-radius: 8px;
    border: 1px solid #2e2e2e; font-size: 0.9em; font-style: italic; color: #6c6c6c;
  }
  .thinking-block summary { cursor: pointer; color: #6c6c6c; }
  pre, code { font-family: 'Cascadia Code', 'Fira Code', monospace; }
  .text-content { white-space: pre-wrap; word-wrap: break-word; }
</style>
</head>
<body>
<script>
const SESSION_DATA = {{SESSION_DATA}};

function render() {
  const s = SESSION_DATA;

  const header = document.createElement('div');
  header.className = 'header';
  header.innerHTML = `<h1>${esc(s.title || 'Untitled Session')}</h1>
    <div class="meta">${esc(s.model || '')} &middot; ${esc(s.startedAt || '')} &middot; ${s.messages.length} messages</div>`;
  document.body.appendChild(header);

  const container = document.createElement('div');
  container.className = 'messages';

  for (const msg of s.messages) {
    const div = document.createElement('div');
    div.className = 'message ' + msg.role;
    let html = `<div class="role-label ${msg.role}">${esc(msg.role)}</div>`;

    for (const block of msg.content) {
      if (block.type === 'text') {
        html += `<div class="text-content">${esc(block.text)}</div>`;
      } else if (block.type === 'tool_use') {
        html += `<details class="tool-block"><summary>${esc(block.toolName)}</summary>`;
        html += `<pre>${esc(JSON.stringify(block.input, null, 2))}</pre>`;
        if (block.output) html += `<pre>${esc(block.output)}</pre>`;
        html += `</details>`;
      } else if (block.type === 'thinking') {
        html += `<details class="thinking-block"><summary>Thinking...</summary>`;
        html += `<div class="text-content">${esc(block.text)}</div></details>`;
      } else if (block.type === 'code_block') {
        html += `<pre><code>${esc(block.code)}</code></pre>`;
      }
    }

    div.innerHTML = html;
    container.appendChild(div);
  }
  document.body.appendChild(container);
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

render();
</script>
</body>
</html>
